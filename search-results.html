      background: rgba(217, 217, 217, 0.95);
      color: var(--dark-grey);
      border-radius: 18px;
      padding: 24px 20px 18px;
      box-shadow: 0 18px 40px rgba(27, 35, 116, 0.24);
    }

    .search-box label {
      display: block;
      text-align: left;
      margin-bottom: 10px;
      font-weight: 600;
    }

      width: 100%;
      padding: 14px 16px;
      border: 1px solid #c8c8d8;
      border-radius: 10px;
      font-size: 1rem;
    }

    .search-btn {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, var(--light-blue), var(--dark-blue));
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .results {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      width: 100%;
    }

    .results-header {
      color: #fff;
      margin-bottom: 24px;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .result-item {
      background: rgba(217, 217, 217, 0.95);
      color: var(--dark-grey);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 14px 30px rgba(27, 35, 116, 0.18);
    }

    .result-item h3 { 
      margin-bottom: 14px;
      font-size: 1.3rem;
    }

    .result-item p { 
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .result-item a {
      color: var(--light-blue);
      text-decoration: none;
      font-weight: 600;
    }

    .result-item a:hover {
      text-decoration: underline;
    }

    .no-results { 
      color: rgba(255, 255, 255, 0.85);
      font-style: italic;
      text-align: center;
      padding: 20px;
      font-size: 1.1rem;
    }

    footer {
      margin-top: auto;
      text-align: center;
      padding: 18px;
      background: rgba(255, 255, 255, 0.92);
      color: #666;
    }

    @media (max-width: 900px) {
      .search-box {
        max-width: 100%;
      }
    }
  </style>
</head>

    function searchResults() {
      const query = document.getElementById("searchTerm").value.toLowerCase().trim();
      const resultsDiv = document.getElementById("results");

      if (!query) {
        resultsDiv.innerHTML = '<p class="no-results">Please enter a zip code or location.</p>';
        return;
      }

      const matches = waterBodies.filter(item =>
        item.location.toLowerCase().includes(query) ||
        item.waterbody.toLowerCase().includes(query) ||
        item.activities.toLowerCase().includes(query) ||
        (item.zipcode && item.zipcode.includes(query))
      );

      if (matches.length === 0) {
        resultsDiv.innerHTML = '<p class="no-results">No results found for "' + query + '"</p>';
        return;
      }

      let html = '<div class="results-header">Results for "' + query + '" (' + matches.length + ' found)</div>';
      matches.forEach(item => {
        html += `
        <div class="result-item">
          <h3>${item.waterbody}</h3>
          <p><strong>Location:</strong> ${item.location}</p>
          <p><strong>Zip Code:</strong> ${item.zipcode || "N/A"}</p>
          <p><strong>Swimmability:</strong> ${item.swimmability}/10</p>
          <p><strong>Drinkable:</strong> ${item.drinkable}</p>
          <p><strong>Activities:</strong> ${item.activities}</p>
          <p><strong>Source:</strong> <a href="${item.sources}" target="_blank" rel="noopener noreferrer">${item.sources}</a></p>
        </div>
        `;
      });
      resultsDiv.innerHTML = html;
    }

    document.getElementById("searchTerm").addEventListener("keypress", function(e) {
      if (e.key === "Enter") searchResults();
    });

    const params = new URLSearchParams(window.location.search);
    const initialQuery = params.get("query");

    if (initialQuery) {
      document.getElementById("searchTerm").value = initialQuery;
      searchResults();
    }
  </script>
